aid: google-cloud-tasks
name: Google Cloud Tasks
description: >-
  Google Cloud Tasks enables you to manage the execution of large numbers of
  distributed tasks. Cloud Tasks lets you create and dispatch tasks to worker
  services running on App Engine or any arbitrary HTTP endpoint, with automatic
  rate limiting, retry logic, and task deduplication. It provides a fully managed
  service for asynchronous task execution, allowing you to offload work from your
  main application and process it reliably in the background.
